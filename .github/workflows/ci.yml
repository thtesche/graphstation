name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      # Memgraph als Service-Container (kompatibel mit Neo4j-Treiber über Bolt)
      memgraph:
        image: memgraph/memgraph-mage:latest
        ports:
          - 7687:7687
        # Für den Test: kein Auth, damit Tests direkt connecten können
        options: >-
          --name memgraph
          -e MEMGRAPH_ARG="--no-auth --bolt-address 0.0.0.0"

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest (Integrationstests mit Memgraph)
      run: |
        cd backend
        echo "Waiting for Memgraph to be ready..."
        timeout 30s bash -c 'until printf "" 2>>/dev/null >>/dev/tcp/127.0.0.1/7687; do sleep 1; done'
        MEMGRAPH_HOST=127.0.0.1 MEMGRAPH_PORT=7687 MEMGRAPH_USER='' MEMGRAPH_PASSWORD='' pytest

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Run Vitest
      run: |
        cd frontend
        npm run test