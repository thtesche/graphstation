server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/atlantis.pem;
    ssl_certificate_key /etc/nginx/certs/atlantis-key.pem;

    # Explicitly route logs to stdout/stderr for docker logs
    access_log /dev/stdout;
    error_log /dev/stderr;

    # Serve the frontend
    location /graphstation/ {
        alias /usr/share/nginx/html/graphstation/;
        try_files $uri $uri/ /graphstation/index.html;
    }

    # Proxy API requests to the backend container
    location /graphstation-api/ {
        proxy_pass http://api:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect root to /graphstation/
    location = / {
        return 301 /graphstation/;
    }
}
